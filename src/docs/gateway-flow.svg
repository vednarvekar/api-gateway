<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 640" role="img">
<title>API Gateway request pipeline</title>
<desc>Flowchart showing a request flowing through rate limiting, auth, RBAC, cache, circuit breaker, proxy, and upstream services.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-rej" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- background -->
<rect width="680" height="640" fill="#FAFAF8" rx="12"/>

<!-- ── CLIENT ── -->
<rect x="230" y="18" width="220" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="38" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#2C2C2A">Client / Consumer</text>

<line x1="340" y1="58" x2="340" y2="78" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── STAGE 1: Rate limit IP ── -->
<rect x="190" y="78" width="300" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="97" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#412402">Rate limit — per IP</text>
<text x="340" y="115" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#633806">Redis INCR · 100 req/min · X-RateLimit-* headers</text>
<!-- reject -->
<line x1="490" y1="104" x2="540" y2="104" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-rej)"/>
<rect x="542" y="86" width="58" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="571" y="104" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5F5E5A">429</text>

<line x1="340" y1="130" x2="340" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── STAGE 2: Auth ── -->
<rect x="190" y="150" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="169" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#26215C">Auth — JWT or API Key</text>
<text x="340" y="187" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#3C3489">Bearer token · x-api-key · authType: jwt | apikey | any</text>
<!-- reject -->
<line x1="490" y1="176" x2="540" y2="176" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-rej)"/>
<rect x="542" y="158" width="58" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="571" y="176" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5F5E5A">401</text>

<line x1="340" y1="202" x2="340" y2="222" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── STAGE 3: RBAC ── -->
<rect x="190" y="222" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="241" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#26215C">RBAC — role check</text>
<text x="340" y="259" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#3C3489">payload.role vs route.roles[ ] · stored in Postgres</text>
<!-- reject -->
<line x1="490" y1="248" x2="540" y2="248" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-rej)"/>
<rect x="542" y="230" width="58" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="571" y="248" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5F5E5A">403</text>

<line x1="340" y1="274" x2="340" y2="294" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── STAGE 4: Cache ── -->
<rect x="190" y="294" width="300" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="313" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#04342C">Cache — GET only</text>
<text x="340" y="331" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#085041">Redis lookup · 60s TTL · X-Cache: HIT / MISS</text>
<!-- HIT branch -->
<line x1="490" y1="320" x2="540" y2="320" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-rej)"/>
<rect x="542" y="302" width="58" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="571" y="320" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#085041">HIT</text>

<line x1="340" y1="346" x2="340" y2="366" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── STAGE 5: Circuit breaker ── -->
<rect x="190" y="366" width="300" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="385" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4A1B0C">Circuit breaker</text>
<text x="340" y="403" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#712B13">opossum · 50% err rate · open 30s · per upstream</text>
<!-- open branch -->
<line x1="490" y1="392" x2="540" y2="392" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-rej)"/>
<rect x="542" y="374" width="58" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="571" y="392" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5F5E5A">503</text>

<line x1="340" y1="418" x2="340" y2="438" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── STAGE 6: Proxy ── -->
<rect x="190" y="438" width="300" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="457" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#04342C">Proxy — undici</text>
<text x="340" y="475" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#085041">Forward + x-user-id · 5s/10s timeout · log + metrics</text>

<line x1="340" y1="490" x2="340" y2="510" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- fan lines to upstream boxes -->
<line x1="340" y1="510" x2="160" y2="510" stroke="#B4B2A9" stroke-width="0.8"/>
<line x1="340" y1="510" x2="520" y2="510" stroke="#B4B2A9" stroke-width="0.8"/>

<!-- ── UPSTREAM SERVICES ── -->
<rect x="80"  y="510" width="160" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="160" y="528" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">:4001 /user</text>

<rect x="260" y="510" width="160" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="528" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">:4002 /order</text>

<rect x="440" y="510" width="160" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="520" y="528" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">:4006 /billing</text>

<!-- ── LEFT SIDEBAR: Postgres + Redis ── -->
<rect x="8" y="78" width="100" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="58" y="100" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#042C53">Postgres</text>
<text x="58" y="118" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#0C447C">Routes · roles</text>
<text x="58" y="133" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#0C447C">30s refresh</text>
<line x1="108" y1="118" x2="188" y2="118" stroke="#185FA5" stroke-width="0.6" stroke-dasharray="3 2"/>

<rect x="8" y="222" width="100" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="58" y="244" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#412402">Redis</text>
<text x="58" y="262" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#633806">Rate limiting</text>
<text x="58" y="277" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#633806">Response cache</text>
<line x1="108" y1="262" x2="188" y2="262" stroke="#854F0B" stroke-width="0.6" stroke-dasharray="3 2"/>
<line x1="108" y1="320" x2="188" y2="320" stroke="#854F0B" stroke-width="0.6" stroke-dasharray="3 2"/>

<!-- ── LEFT SIDEBAR: Prometheus ── -->
<rect x="8" y="438" width="100" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="58" y="457" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#2C2C2A">Prometheus</text>
<text x="58" y="475" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#5F5E5A">/metrics</text>
<line x1="108" y1="464" x2="188" y2="464" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 2"/>

<!-- ── LEGEND ── -->
<text x="340" y="566" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888780">dashed lines = rejection paths · right side = HTTP status codes returned</text>

<!-- ── BENCHMARK ── -->
<rect x="190" y="580" width="300" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="596" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#2C2C2A">Benchmark — single instance, localhost</text>
<text x="340" y="612" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#5F5E5A">250 concurrent · 6,084 RPS · 40ms avg · 100% pass rate</text>

</svg>
